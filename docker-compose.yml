version: '3.7'

services:
  postgres_db:
    image: bitnami/postgresql:latest
    container_name: teach_postgres_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  elysia_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teach_elysia_api
    ports:
      - '3333:3333'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres_db:
        condition: service_healthy

  react_app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teach_react_app
    ports:
      - '8080:8080'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - elysia_api

volumes:
  postgres_data:

networks:
  teach_network:
    driver: bridge